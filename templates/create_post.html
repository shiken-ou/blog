<!DOCTYPE html>
<html lang="jp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create post</title>
</head>

<body>
    <form method="post">
        <div>
            {{ form.title.label }}<br>
            {{ form.title() }}
        </div>
        <div>
            {{ form.content.label }}<br>
            {{ form.content() }}
        </div>
        <div>
            {{ form.submit() }}
        </div>
    </form>
</body>

</html>
